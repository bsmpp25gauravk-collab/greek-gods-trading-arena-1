<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Greek Gods Trading Arena{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">GREEK GODS<br><small>TRADING ARENA</small></span>
    </a>
    <ul class="nav-links">
      <li><a href="/" class="nav-link {% if request.endpoint=='index' %}active{% endif %}">Home</a></li>
      <li><a href="/study" class="nav-link {% if request.endpoint=='study' %}active{% endif %}">Study</a></li>
      <li><a href="/calculator" class="nav-link {% if request.endpoint=='calculator' %}active{% endif %}">Calculator</a></li>
      <li><a href="/scenarios" class="nav-link {% if request.endpoint=='scenarios' %}active{% endif %}">Scenarios</a></li>
      <li><a href="/portfolio" class="nav-link nav-link-gold {% if request.endpoint=='portfolio' %}active{% endif %}">📊 Portfolio</a></li>
      <li><a href="/arena" class="nav-link nav-link-arena {% if request.endpoint=='arena' %}active{% endif %}">🎮 Arena</a></li>
    </ul>
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">⚡ Greek Gods Trading Arena</span>
      <span class="footer-note">For educational purposes only. Not financial advice.</span>
    </div>
  </footer>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
